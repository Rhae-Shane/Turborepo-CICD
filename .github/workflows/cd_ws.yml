name: DEPLOY  WEBSOCKET

on:
  push:
    branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Docker Login
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v4
              with:
                context: .
                file: ./docker/Dockerfile.ws
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/websocket:${{ github.sha }}
            - name: Deploy to Server
              run: |  
                echo "${{ secrets.SSH_PRIVATE_KEY }}" &> ~/ssh_key
                chmod 600 ~/ssh_key
                ssh -o StrictHostKeyChecking=no -i ~/ssh_key ubuntu@13.60.94.207 << 'EOF'
                  docker stop websocket || true
                  docker rm websocket || true

                  docker run -d -p 8081:8081 \
                    --name websocket \
                    --restart unless-stopped \
                    rhaeshane/websocket:${{ github.sha }}
                EOF